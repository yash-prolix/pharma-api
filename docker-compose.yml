services:
  pharma-api:
    build: .
    command: npm run start:dev
    working_dir: /app
    restart: always
    ports:
      - '3000:3000'
    depends_on:
      - postgres
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/pharma_db

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    restart: always
    ports:
      - '8080:8080'
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres

# -------------------- VOLUMES --------------------
volumes:
  postgres_data:
